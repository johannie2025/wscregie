name: EliteCast Régie – Build & Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Build APK EliteCast Régie
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 🔑 Permissions gradlew
        run: chmod +x gradlew

      - name: 🎨 Injection Icônes
        run: |
          MIPMAP_DIR="app/src/main/res/mipmap-mdpi"
          mkdir -p $MIPMAP_DIR
          curl -L -o "$MIPMAP_DIR/ic_launcher.png" "https://github.com/android/user-interface-samples/raw/main/UserInterface/ActionBarCompat-Styled/src/main/res/mipmap-mdpi/ic_launcher.png"
          cp "$MIPMAP_DIR/ic_launcher.png" "$MIPMAP_DIR/ic_launcher_round.png"

      - name: 🏗️ Build Debug APKs
        run: |
          mkdir -p app/libs
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload All Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: EliteCastRegie-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: 🚀 Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: 📦 Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: 🏷️ GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "EliteCast Régie ${{ github.ref_name }}"
          files: app/build/outputs/apk/release/*.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}